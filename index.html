<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>WOU — Brand Guidelines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Alumni+Sans:wght@400;700&family=Libre+Franklin:wght@400;600&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      display: flex;
      font-family: 'Libre Franklin', sans-serif;
      min-height: 100vh;
      background: #EBEBEB;
      overflow-x: hidden;
    }

    /* ─────────────────────────────────────
       SIDEBAR
    ───────────────────────────────────── */

    .sidebar {
      width: 312px;
      min-width: 312px;
      flex-shrink: 0;
      background: #F2F0EB;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 40px 32px 36px;
      overflow: hidden;
    }

    .sidebar-logo {
      margin-bottom: 44px;
    }

    .sidebar-logo img {
      height: 50px;
      width: auto;
      display: block;
    }

    .sidebar-nav {
      flex: 1;
    }

    .sidebar-nav ul {
      list-style: none;
    }

    .sidebar-nav ul li {
      margin-bottom: 0;
    }

    .sidebar-nav ul li a {
      font-family: 'Libre Franklin', sans-serif;
      font-size: 26px;
      font-weight: 500;
      color: #080F1A;
      text-decoration: none;
      display: block;
      padding: 2px 0;
      letter-spacing: 0;
      line-height: 1.2;
      transition: color 0.15s ease;
    }

    .sidebar-nav ul li a.active,
    .sidebar-nav ul li a:hover {
      color: #003AB2;
    }

    .sidebar-bottom {
      margin-top: auto;
    }

    .sidebar-links {
      margin-bottom: 20px;
    }

    .sidebar-links a {
      display: block;
      font-family: 'Libre Franklin', sans-serif;
      font-size: 13px;
      color: #080F1A;
      text-decoration: none;
      padding: 3px 0;
      transition: color 0.15s ease;
    }

    .sidebar-links a:hover {
      color: #003AB2;
    }

    .sidebar-contact-label {
      display: block;
      font-family: 'Libre Franklin', sans-serif;
      font-size: 13px;
      color: #080F1A;
      padding: 3px 0 2px;
    }

    .sidebar-contact-email {
      display: block;
      font-family: 'Libre Franklin', sans-serif;
      font-size: 12px;
      color: #555;
      padding-bottom: 3px;
      user-select: all;
      cursor: text;
    }

    .sidebar-rebranding {
      font-family: 'Libre Franklin', sans-serif;
      font-size: 34px;
      font-weight: 700;
      color: #080F1A;
      letter-spacing: 0;
    }

    /* ─────────────────────────────────────
       MAIN
    ───────────────────────────────────── */

    .main {
      flex: 1;
      min-width: 0;
    }

    /* ─────────────────────────────────────
       SECTION BASE
    ───────────────────────────────────── */

    .section {
      padding: 80px 88px;
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 56px;
    }

    .section-title {
      font-family: 'Boldonse', sans-serif;
      font-weight: 400;
      font-size: clamp(100px, 13vw, 220px);
      line-height: 0.88;
      letter-spacing: -0.01em;
    }

    .section-num {
      font-family: 'Libre Franklin', sans-serif;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1;
      padding-top: 8px;
      flex-shrink: 0;
    }

    /* Pills */
    .pill {
      display: inline-flex;
      align-items: center;
      border: 3px solid currentColor;
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 11px;
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
      background: transparent;
      line-height: 1.4;
    }


    /* ─────────────────────────────────────
       HERO
    ───────────────────────────────────── */

    #hero {
      height: 100vh;
      background: #080F1A;
      overflow: hidden;
      position: relative;
    }

    .lineup-waves {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .lineup-waves svg {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }
    .lw-line {
      fill: none;
      stroke: #1A3BFF;
      stroke-width: 2.5px;
      opacity: 0.55;
    }

    /* ─────────────────────────────────────
       01 ESENCIA
    ───────────────────────────────────── */

    #esencia {
      background: #FFFFFF;
    }

    #esencia .section-title {
      color: #003AB2;
    }

    #esencia .section-num {
      color: #080F1A;
      font-weight: 700;
      font-size: 24px;
      padding-top: 0;
    }


    /* ─────────────────────────────────────
       02 LENGUAJE
    ───────────────────────────────────── */

    #lenguaje {
      background: #003AB2;
    }

    #lenguaje .section-title {
      color: #FFFFFF;
    }

    #lenguaje .section-num {
      color: #FFFFFF;
    }


    /* ─────────────────────────────────────
       03 LOGO
    ───────────────────────────────────── */

    #logo {
      background: #FFFFFF;
    }

    #logo .section-title {
      color: #080F1A;
    }

    #logo .section-num {
      color: #080F1A;
    }


    /* ─────────────────────────────────────
       04 COLOR
    ───────────────────────────────────── */

    #color {
      background: #00C9B1;
    }

    #color .section-title {
      color: #080F1A;
    }

    #color .section-num {
      color: #080F1A;
    }


    /* ─────────────────────────────────────
       05 TIPOGRAFÍAS
    ───────────────────────────────────── */

    #tipografias {
      background: #FFFFFF;
    }

    #tipografias .section-title {
      color: #080F1A;
    }

    #tipografias .section-num {
      color: #080F1A;
    }


    /* ─────────────────────────────────────
       06 RECURSOS
    ───────────────────────────────────── */

    #recursos {
      background: #003AB2;
    }

    #recursos .section-title {
      color: #FFFFFF;
    }

    #recursos .section-num {
      color: #FFFFFF;
    }

    #recursos .pill {
      color: #FFFFFF !important;
    }


    /* ─────────────────────────────────────
       07 APLICACIONES
    ───────────────────────────────────── */

    #aplicaciones {
      background: #FFFFFF;
    }

    #aplicaciones .section-title {
      color: #080F1A;
      font-family: 'Boldonse', sans-serif;
      font-weight: 400;
      font-size: clamp(40px, 6.2vw, 92px);
    }

    #aplicaciones .title-row {
      margin-bottom: 48px;
    }

    .app-block .pill {
      margin-bottom: 24px;
      font-size: 16px;
      font-weight: 700;
      padding: 3px 20px;
    }

    #aplicaciones .section-num {
      color: #080F1A;
      font-size: 32px;
      font-weight: 700;
      padding-top: 0;
    }

    .app-block {
      margin-bottom: 64px;
    }

    .app-block:last-child {
      margin-bottom: 0;
    }


    .app-block img {
      width: 100%;
      display: block;
      border-radius: 0;
      margin-bottom: 16px;
    }

    .video-wrapper {
      background: #EBEBEB;
      padding: 56px 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 16px;
    }

    .video-wrapper video {
      width: 100%;
      display: block;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
    }

    .app-block img:last-child {
      margin-bottom: 0;
    }

    /* ─────────────────────────────────────
       FOOTER
    ───────────────────────────────────── */

    .app-footer-img {
      width: 105%;
      display: block;
      margin-top: 100px;
    }



    /* ─────────────────────────────────────
       MOBILE HEADER
    ───────────────────────────────────── */

    .mobile-header {
      display: none;
    }

    .sidebar-close {
      display: none;
    }

    /* ─────────────────────────────────────
       RESPONSIVE — MOBILE
    ───────────────────────────────────── */

    @media (max-width: 768px) {

      body {
        flex-direction: column;
      }

      /* Mobile top bar */
      .mobile-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 24px;
        background: #F2F0EB;
        position: sticky;
        top: 0;
        z-index: 100;
        border-bottom: 1px solid rgba(8,15,26,0.1);
      }

      .mobile-logo {
        height: 28px;
        width: auto;
      }

      .hamburger {
        background: none;
        border: none;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding: 4px;
      }

      .hamburger span {
        display: block;
        width: 26px;
        height: 2px;
        background: #080F1A;
        border-radius: 2px;
      }

      /* Sidebar becomes full-screen overlay */
      .sidebar {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        z-index: 200;
        min-width: unset;
        padding: 48px 32px 40px;
        overflow-y: auto;
      }

      .sidebar.open {
        display: flex;
      }

      .sidebar-close {
        display: block;
        position: absolute;
        top: 20px;
        right: 24px;
        background: none;
        border: none;
        font-size: 28px;
        cursor: pointer;
        color: #080F1A;
        line-height: 1;
        padding: 4px;
      }

      .sidebar-logo {
        margin-bottom: 36px;
      }

      .sidebar-nav ul li a {
        font-size: 36px;
        padding: 6px 0;
      }

      .sidebar-rebranding {
        font-size: 28px;
      }

      /* Main content full width */
      .main {
        width: 100%;
      }

      /* Hero */
      #hero {
        height: 60vh;
      }

      /* Section padding */
      .section {
        padding: 40px 20px;
      }

      /* Aplicaciones title */
      #aplicaciones .section-title {
        font-size: clamp(24px, 7.5vw, 44px);
      }

      #aplicaciones .section-num {
        font-size: 18px;
        padding-top: 4px;
      }

      #aplicaciones .title-row {
        margin-bottom: 32px;
      }

      /* Video */
      .video-wrapper {
        padding: 24px 20px;
      }

      /* App blocks */
      .app-block {
        margin-bottom: 40px;
      }

      .app-block .pill {
        font-size: 13px;
        padding: 3px 14px;
        margin-bottom: 16px;
      }

      .app-footer-img {
        margin-top: 40px;
      }

    }

  </style>
</head>
<body id="top">

  <!-- MOBILE HEADER -->
  <header class="mobile-header">
    <img src="assets/logo-wou.svg" alt="WOU" class="mobile-logo">
    <button class="hamburger" id="menuBtn" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar" id="sidebar">
    <button class="sidebar-close" id="closeBtn" aria-label="Cerrar menú">✕</button>
    <div class="sidebar-logo">
      <a href="#top" style="display:block;"><img src="assets/logo-wou.svg" alt="WOU"></a>
    </div>
    <nav class="sidebar-nav">
      <ul>
        <li><a href="#esencia">Esencia</a></li>
        <li><a href="#lenguaje">Lenguaje</a></li>
        <li><a href="#logo">Logo</a></li>
        <li><a href="#color">Color</a></li>
        <li><a href="#tipografias">Tipografía</a></li>
        <li><a href="#recursos">Recursos</a></li>
        <li><a href="#aplicaciones">Aplicaciones</a></li>
      </ul>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-links">
        <a href="https://drive.google.com/drive/folders/12_24lt12foSpLEV9LE5z4wZ9JqR7WrE4" target="_blank" rel="noopener">Descargar kit de diseño</a>
        <span class="sidebar-contact-label">Contactanos</span>
        <span class="sidebar-contact-email">estudiojogging@gmail.com</span>
      </div>
      <div class="sidebar-rebranding">Rebranding</div>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="main">

    <!-- ───────────── HERO ───────────── -->
    <section id="hero">
      <div class="lineup-waves" id="lineup-waves" aria-hidden="true">
        <svg id="lineup-waves-svg"></svg>
      </div>
    </section>


    <!-- 01 ESENCIA -->
    <section id="esencia">
      <img src="Secciones/Esencia.png" alt="Esencia" style="width:100%; display:block;">
    </section>

    <!-- 02 LENGUAJE -->
    <section id="lenguaje">
      <img src="Secciones/Lenguaje.png" alt="Lenguaje" style="width:100%; display:block;">
    </section>

    <!-- 03 LOGO -->
    <section id="logo">
      <img src="Secciones/Logo.png" alt="Logo" style="width:100%; display:block;">
    </section>

    <!-- 04 COLOR -->
    <section id="color">
      <img src="Secciones/Colores.png" alt="Color" style="width:100%; display:block;">
    </section>

    <!-- 05 TIPOGRAFIAS -->
    <section id="tipografias">
      <img src="Secciones/Tipograf%C3%ADas.png" alt="Tipografias" style="width:100%; display:block;">
    </section>

    <!-- 06 RECURSOS -->
    <section id="recursos">
      <img src="Secciones/Recursos.png" alt="Recursos" style="width:100%; display:block;">
    </section>

    <!-- ───────────── 07 APLICACIONES ───────────── -->
    <section id="aplicaciones" class="section">

      <div class="title-row">
        <h2 class="section-title">APLICACIONES</h2>
        <span class="section-num">07</span>
      </div>


      <div class="app-block">
        <span class="pill" style="color:#080F1A;">Sitio web</span>
        <div class="video-wrapper">
          <video src="Video/Radio%20Wou%20web.mp4" autoplay muted loop playsinline></video>
        </div>
        <img src="assets/Aplicaciones Sitio web 2.png" alt="Sitio web 2">
      </div>

      <div class="app-block">
        <span class="pill" style="color:#080F1A;">Redes sociales</span>
        <img src="assets/Redes sociales.png" alt="Redes sociales">
      </div>

      <div class="app-block">
        <span class="pill" style="color:#080F1A;">Stream</span>
        <img src="assets/stream.png" alt="Stream">
      </div>

      <img src="assets/Footer.png" alt="Footer" class="app-footer-img">

    </section>

  </main>

  <script>
    const navLinks = document.querySelectorAll('.sidebar-nav a');
    const sections = document.querySelectorAll('section[id]');
    const navOrder = ['esencia', 'lenguaje', 'logo', 'color', 'tipografias', 'recursos', 'aplicaciones'];

    const visible = new Set();

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          visible.add(entry.target.id);
        } else {
          visible.delete(entry.target.id);
        }
      });

      const active = navOrder.find(id => visible.has(id));
      navLinks.forEach(link => {
        const href = link.getAttribute('href').slice(1);
        link.classList.toggle('active', href === active);
      });
    }, { threshold: 0.1 });

    sections.forEach(s => observer.observe(s));

    // ── Hamburger menu ──
    const menuBtn = document.getElementById('menuBtn');
    const closeBtn = document.getElementById('closeBtn');
    const sidebar = document.getElementById('sidebar');

    menuBtn?.addEventListener('click', () => sidebar.classList.add('open'));
    closeBtn?.addEventListener('click', () => sidebar.classList.remove('open'));
    sidebar.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => sidebar.classList.remove('open'));
    });

    // ── Perlin noise ──────────────────────────────────────────────────────────
    class PerlinNoise {
      constructor(seed = Math.random()) {
        const perm = Array.from({ length: 256 }, (_, i) => i);
        let s = Math.round(seed * 2147483647);
        for (let i = 255; i > 0; i--) {
          s = ((s * 16807) >>> 0) % 2147483647;
          const j = ((s / 2147483647) * (i + 1)) | 0;
          [perm[i], perm[j]] = [perm[j], perm[i]];
        }
        this.p = new Uint8Array(512);
        for (let i = 0; i < 256; i++) this.p[i] = this.p[i + 256] = perm[i];
      }
      fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
      lerp(a, b, t) { return a + (b - a) * t; }
      grad(h, x, y) { h &= 3; return ((h & 1) ? -x : x) + ((h & 2) ? -y : y); }
      noise(x, y) {
        const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
        x -= Math.floor(x); y -= Math.floor(y);
        const u = this.fade(x), v = this.fade(y);
        const a = this.p[X] + Y, b = this.p[X + 1] + Y;
        return this.lerp(
          this.lerp(this.grad(this.p[a],     x,     y    ), this.grad(this.p[b],     x - 1, y    ), u),
          this.lerp(this.grad(this.p[a + 1], x,     y - 1), this.grad(this.p[b + 1], x - 1, y - 1), u),
          v
        );
      }
    }

    // ── Wave animation ────────────────────────────────────────────────────────
    (function () {
      const container = document.getElementById('lineup-waves');
      const svgEl     = document.getElementById('lineup-waves-svg');
      const heroEl    = document.getElementById('hero');
      if (!container || !svgEl || !heroEl) return;

      const noise = new PerlinNoise(Math.random());
      let lines = [], paths = [];
      let bounding = { width: 0, height: 0 };
      let mouse = { x: -10, y: 0, lx: 0, ly: 0, sx: 0, sy: 0, v: 0, vs: 0, a: 0, set: false };
      let rafId, startTime = null;

      function setSize() {
        bounding = { width: container.clientWidth, height: container.clientHeight };
        svgEl.style.width  = bounding.width  + 'px';
        svgEl.style.height = bounding.height + 'px';
      }

      function setLines() {
        lines = []; paths.forEach(p => p.remove()); paths = [];
        const { width, height } = bounding;
        const xGap = 18, yGap = 24;
        const totalLines  = Math.ceil((height + yGap * 2) / yGap);
        const totalPoints = Math.ceil((width  + xGap * 2) / xGap);
        const yStart = (height - yGap * totalLines) / 2;
        for (let i = 0; i <= totalLines; i++) {
          const pts = [];
          const yBase = yStart + yGap * i;
          for (let j = 0; j <= totalPoints; j++)
            pts.push({ x: -xGap + xGap * j, y: yBase, wave: { x: 0, y: 0 }, cursor: { x: 0, y: 0, vx: 0, vy: 0 } });
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('class', 'lw-line');
          svgEl.appendChild(path);
          paths.push(path); lines.push(pts);
        }
      }

      function movePoints(t) {
        lines.forEach(pts => pts.forEach(p => {
          const n = noise.noise((p.x + t * 0.032) * 0.0018, (p.y + t * 0.012) * 0.0014) * 14;
          p.wave.y = Math.sin(n) * 26; p.wave.x = Math.cos(n) * 5;
          const dx = p.x - mouse.sx, dy = p.y - mouse.sy;
          const d = Math.hypot(dx, dy), l = Math.max(160, mouse.vs);
          if (d < l) {
            const s = 1 - d / l, f = Math.cos(d * 0.001) * s;
            p.cursor.vx += Math.cos(mouse.a) * f * l * mouse.vs * 0.0011;
            p.cursor.vy += Math.sin(mouse.a) * f * l * mouse.vs * 0.0011;
          }
          p.cursor.vx += (0 - p.cursor.x) * 0.007; p.cursor.vy += (0 - p.cursor.y) * 0.007;
          p.cursor.vx *= 0.905; p.cursor.vy *= 0.905;
          p.cursor.x = Math.min(130, Math.max(-130, p.cursor.x + p.cursor.vx * 2));
          p.cursor.y = Math.min(130, Math.max(-130, p.cursor.y + p.cursor.vy * 2));
        }));
      }

      function drawLines() {
        lines.forEach((pts, li) => {
          const p0 = pts[0];
          let d = 'M ' + (p0.x + p0.wave.x).toFixed(1) + ' ' + (p0.y + p0.wave.y).toFixed(1);
          for (let pi = 1; pi < pts.length; pi++) {
            const p = pts[pi];
            d += ' L ' + (p.x + p.wave.x + p.cursor.x).toFixed(1) + ' ' + (p.y + p.wave.y + p.cursor.y).toFixed(1);
          }
          paths[li].setAttribute('d', d);
        });
      }

      function tick(t) {
        mouse.sx += (mouse.x - mouse.sx) * 0.1; mouse.sy += (mouse.y - mouse.sy) * 0.1;
        const dx = mouse.x - mouse.lx, dy = mouse.y - mouse.ly, d = Math.hypot(dx, dy);
        mouse.vs = Math.min(100, mouse.vs + (d - mouse.vs) * 0.1);
        mouse.v = d; mouse.lx = mouse.x; mouse.ly = mouse.y; mouse.a = Math.atan2(dy, dx);
        movePoints(t); drawLines();
      }

      function loop(ts) {
        if (startTime === null) startTime = ts;
        tick(ts - startTime);
        rafId = requestAnimationFrame(loop);
      }

      heroEl.addEventListener('mousemove', function (e) {
        const rect = container.getBoundingClientRect();
        mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top;
        if (!mouse.set) { mouse.sx = mouse.lx = mouse.x; mouse.sy = mouse.ly = mouse.y; mouse.set = true; }
      });

      window.addEventListener('resize', function () { setSize(); setLines(); });
      window.addEventListener('pagehide', function () { cancelAnimationFrame(rafId); });

      setSize(); setLines();
      rafId = requestAnimationFrame(loop);
    })();


  </script>

</body>
</html>
